{% extends "base.html" %}

{% block title %}Register Student - HiTec University Library{% endblock %}

{% block extra_css %}
<style>
    /* Mobile Responsive */
    @media (max-width: 768px) {
        .container {
            padding: 0 1rem;
        }
        
        .card-body {
            padding: 1.5rem !important;
        }
        
        h4 {
            font-size: 1.1rem;
        }
        
        .form-label {
            font-size: 0.9rem;
        }
        
        .form-control, .form-select {
            font-size: 0.9rem;
            padding: 0.6rem;
        }
        
        .btn {
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
        }
        
        .alert {
            font-size: 0.9rem;
            padding: 0.75rem;
        }
    }
    
    @media (max-width: 576px) {
        .container {
            padding: 0 0.75rem;
        }
        
        .py-5 {
            padding-top: 1.5rem !important;
            padding-bottom: 1.5rem !important;
        }
        
        .card {
            border-radius: 8px;
        }
        
        .card-header {
            padding: 0.75rem 1rem;
        }
        
        .card-header h4 {
            font-size: 1rem;
            margin-bottom: 0;
        }
        
        .card-body {
            padding: 1rem !important;
        }
        
        .form-label {
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        
        .form-control, .form-select {
            font-size: 0.85rem;
            padding: 0.5rem;
        }
        
        .btn {
            font-size: 0.8rem;
            padding: 0.5rem 0.8rem;
            width: 100%;
            margin-bottom: 0.5rem;
        }
        
        .d-flex {
            flex-direction: column;
        }
        
        .d-flex.gap-2 {
            gap: 0.5rem !important;
        }
        
        .alert {
            font-size: 0.8rem;
            padding: 0.75rem;
        }
        
        .alert strong {
            font-size: 0.8rem;
        }
        
        .mb-3 {
            margin-bottom: 0.75rem !important;
        }
        
        .row {
            margin-right: -0.5rem;
            margin-left: -0.5rem;
        }
        
        .col-md-6 {
            padding-right: 0.5rem;
            padding-left: 0.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-gradient text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-user-plus"></i> Register New Student
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">
                                    <i class="fas fa-user"></i> Full Name *
                                </label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">
                                    <i class="fas fa-envelope"></i> Email *
                                </label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="roll_number" class="form-label">
                                    <i class="fas fa-id-card"></i> Roll Number *
                                </label>
                                <input type="text" class="form-control" id="roll_number" name="roll_number" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">
                                    <i class="fas fa-phone"></i> Phone Number
                                </label>
                                <input type="tel" class="form-control" id="phone" name="phone">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">
                                    <i class="fas fa-building"></i> Department
                                </label>
                                <input type="text" class="form-control" id="department" name="department">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="semester" class="form-label">
                                    <i class="fas fa-book"></i> Semester
                                </label>
                                <select class="form-select" id="semester" name="semester">
                                    <option value="">Select Semester</option>
                                    <option value="1">1st Semester</option>
                                    <option value="2">2nd Semester</option>
                                    <option value="3">3rd Semester</option>
                                    <option value="4">4th Semester</option>
                                    <option value="5">5th Semester</option>
                                    <option value="6">6th Semester</option>
                                    <option value="7">7th Semester</option>
                                    <option value="8">8th Semester</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>Note:</strong> A unique library card number will be automatically generated upon registration.
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Register Student
                            </button>
                            <a href="/admin/students" class="btn btn-outline-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
