{% extends "base.html" %}

{% block title %}Create Loan - HiTec University Library{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-gradient text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-plus-circle"></i> Create New Loan
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="student_id" class="form-label">
                                <i class="fas fa-user"></i> Select Student *
                            </label>
                            <select class="form-select" id="student_id" name="student_id" required>
                                <option value="">-- Choose a Student --</option>
                                {% for student in students %}
                                <option value="{{ student.id }}">
                                    {{ student.name }} ({{ student.roll_number }}) - {{ student.library_card_number }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="book_id" class="form-label">
                                <i class="fas fa-book"></i> Select Book *
                            </label>
                            <select class="form-select" id="book_id" name="book_id" required>
                                <option value="">-- Choose a Book --</option>
                                {% for book in books %}
                                <option value="{{ book.id }}">
                                    {{ book.title }} by {{ book.author }} ({{ book.available_copies }} available)
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>Loan Details:</strong>
                            <ul class="mb-0 mt-2">
                                <li>Loan Duration: 15 days</li>
                                <li>Late Fee: PKR 50 per day</li>
                                <li>Student must have active library card</li>
                                <li>Book must be available</li>
                            </ul>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Create Loan
                            </button>
                            <a href="/admin/loans" class="btn btn-outline-secondary">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
