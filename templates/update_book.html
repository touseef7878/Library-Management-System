{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-pencil-square"></i> Update Book</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label"><i class="bi bi-book"></i> Title *</label>
                        <input type="text" class="form-control" name="title" id="title" value="{{ book.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label"><i class="bi bi-person"></i> Author *</label>
                        <input type="text" class="form-control" name="author" id="author" value="{{ book.author }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="genre" class="form-label"><i class="bi bi-bookmark"></i> Genre</label>
                        <input type="text" class="form-control" name="genre" id="genre" value="{{ book.genre }}">
                    </div>
                    <div class="mb-3">
                        <label for="year_published" class="form-label"><i class="bi bi-calendar"></i> Year Published</label>
                        <input type="number" class="form-control" name="year_published" id="year_published" value="{{ book.year_published }}" min="1000" max="2100">
                    </div>
                    <div class="mb-3">
                        <label for="cover_image" class="form-label"><i class="bi bi-image"></i> Cover Image URL</label>
                        <input type="url" class="form-control" name="cover_image" id="cover_image" value="{{ book.cover_image or '' }}">
                        {% if book.cover_image %}
                        <small class="text-muted">Current: <a href="{{ book.cover_image }}" target="_blank">View Image</a></small>
                        {% endif %}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Update Book</button>
                        <a href="/books" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
