{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-plus-circle"></i> Add New Book</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="title" class="form-label"><i class="bi bi-book"></i> Title *</label>
                        <input type="text" class="form-control" name="title" id="title" required placeholder="Enter book title">
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label"><i class="bi bi-person"></i> Author *</label>
                        <input type="text" class="form-control" name="author" id="author" required placeholder="Enter author name">
                    </div>
                    <div class="mb-3">
                        <label for="genre" class="form-label"><i class="bi bi-bookmark"></i> Genre</label>
                        <input type="text" class="form-control" name="genre" id="genre" placeholder="e.g., Fiction, Science, History">
                    </div>
                    <div class="mb-3">
                        <label for="year_published" class="form-label"><i class="bi bi-calendar"></i> Year Published</label>
                        <input type="number" class="form-control" name="year_published" id="year_published" min="1000" max="2100" placeholder="e.g., 2024">
                    </div>
                    <div class="mb-3">
                        <label for="cover_image" class="form-label"><i class="bi bi-image"></i> Cover Image URL</label>
                        <input type="url" class="form-control" name="cover_image" id="cover_image" placeholder="https://example.com/cover.jpg">
                        <small class="text-muted">Optional: Provide a URL to the book cover image</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Add Book</button>
                        <a href="/books" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
