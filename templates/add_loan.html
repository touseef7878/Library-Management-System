{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-plus-circle"></i> Add New Loan</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="member" class="form-label"><i class="bi bi-person"></i> Member *</label>
                        <select class="form-select" name="member" id="member" required>
                            <option value="">Select a member...</option>
                            {% for member in members %}
                            <option value="{{ member.id }}">{{ member.name }} ({{ member.email }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="book" class="form-label"><i class="bi bi-book"></i> Book *</label>
                        <select class="form-select" name="book" id="book" required>
                            <option value="">Select a book...</option>
                            {% for book in books %}
                            <option value="{{ book.id }}">{{ book.title }} by {{ book.author }}</option>
                            {% endfor %}
                        </select>
                        {% if not books %}
                        <small class="text-warning"><i class="bi bi-exclamation-triangle"></i> All books are currently on loan</small>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label for="loan_date" class="form-label"><i class="bi bi-calendar-event"></i> Loan Date *</label>
                        <input type="date" class="form-control" name="loan_date" id="loan_date" required>
                    </div>
                    <div class="mb-3">
                        <label for="return_date" class="form-label"><i class="bi bi-calendar-check"></i> Return Date *</label>
                        <input type="date" class="form-control" name="return_date" id="return_date" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Add Loan</button>
                        <a href="/loans" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Set today's date as default loan date
    document.getElementById('loan_date').valueAsDate = new Date();
    
    // Set return date to 14 days from now
    document.getElementById('loan_date').addEventListener('change', function() {
        const loanDate = new Date(this.value);
        const returnDate = new Date(loanDate);
        returnDate.setDate(returnDate.getDate() + 14);
        document.getElementById('return_date').valueAsDate = returnDate;
    });
</script>
{% endblock %}
