{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4><i class="bi bi-person-plus"></i> Add New Member</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label"><i class="bi bi-person"></i> Name *</label>
                        <input type="text" class="form-control" name="name" id="name" required placeholder="Full name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label"><i class="bi bi-envelope"></i> Email *</label>
                        <input type="email" class="form-control" name="email" id="email" required placeholder="email@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="contact" class="form-label"><i class="bi bi-telephone"></i> Contact</label>
                        <input type="tel" class="form-control" name="contact" id="contact" placeholder="+1 (555) 123-4567">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Add Member</button>
                        <a href="/members" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
