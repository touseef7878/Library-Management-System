<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#001f3f" stroke-width="3"/>
  
  <!-- Inner Circle Background -->
  <circle cx="100" cy="100" r="85" fill="#39CCCC" opacity="0.1"/>
  
  <!-- Book Icon -->
  <g transform="translate(100, 100)">
    <!-- Left page -->
    <path d="M -30 -25 L -10 -25 L -10 25 L -30 25 Z" fill="#0074D9" opacity="0.8"/>
    
    <!-- Right page -->
    <path d="M 10 -25 L 30 -25 L 30 25 L 10 25 Z" fill="#39CCCC"/>
    
    <!-- Book spine -->
    <rect x="-10" y="-25" width="20" height="50" fill="#001f3f"/>
    
    <!-- Lines on pages -->
    <line x1="-25" y1="-15" x2="-15" y2="-15" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-25" y1="-8" x2="-15" y2="-8" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-25" y1="-1" x2="-15" y2="-1" stroke="white" stroke-width="1.5" opacity="0.6"/>
    <line x1="-25" y1="6" x2="-15" y2="6" stroke="white" stroke-width="1.5" opacity="0.6"/>
    
    <line x1="15" y1="-15" x2="25" y2="-15" stroke="#001f3f" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-8" x2="25" y2="-8" stroke="#001f3f" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="-1" x2="25" y2="-1" stroke="#001f3f" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="6" x2="25" y2="6" stroke="#001f3f" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#001f3f">
    HiTec Library
  </text>
</svg>
